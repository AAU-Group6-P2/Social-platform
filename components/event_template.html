<div class="event-page-shell">
    <div id="event-page-inner">
        <div class="event-page-topbar">
            <button class="button event-back-button" type="button" id="close-event-template">Go Back</button>
        </div>

        <h2>Event Page</h2>

        <!-- This form is submitted by dashboardPage.js and sent to the backend /events route. -->
        <form id="event-template-form">
            <div class="card clearfix">
                <h3>
                    <strong>Event name</strong>
                    <input
                        type="text"
                        name="name"
                        placeholder="Name of your event"
                        required>
                </h3>

                <div class="section">
                    <strong>Date</strong>
                    <input
                        type="text"
                        name="date"
                        placeholder="Event date (e.g. March 28, 2026)"
                        required>
                </div>

                <div class="section">
                    <strong>Time</strong>
                    <input
                        type="text"
                        name="time"
                        placeholder="Event time (e.g. 15:00-17:00)"
                        required>
                </div>
            </div>

            <!-- Club owners/admins can connect the event to a specific club here. -->
            <div class="card" id="club-id-card">
                <strong>Club ID</strong>
                <input
                    type="number"
                    id="club-id-input"
                    name="clubId"
                    min="1"
                    placeholder="Club ID"
                    required>
            </div>

            <div class="card">
                <strong>Location</strong>
                <input
                    type="text"
                    name="location"
                    placeholder="Event location"
                    required>
            </div>

            <div class="card">
                <strong>Description</strong>
                <textarea
                    name="description"
                    placeholder="Write event description here"
                    required></textarea>
            </div>

            <div class="card">
                <strong>Practical Information</strong>
                <input
                    type="text"
                    name="practicalInformation"
                    placeholder="Info">
            </div>

            <!-- Screen readers and sighted users both get save status updates here. -->
            <p id="event-form-status" aria-live="polite"></p>

            <div class="event-page-actions">
                <button class="button event-publish-button" type="submit">Publish event</button>
            </div>
        </form>
    </div>
</div>
